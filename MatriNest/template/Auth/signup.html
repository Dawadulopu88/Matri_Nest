{% extends "base.html" %}
{% block title %}Sign Up — মাতৃNest{% endblock %}

{% block content %}
<section class="section" style="padding-top:54px;">
  <div class="form-shell">
    <h2>Create your nest</h2>
    <p class="sub">Start your care journey with মাতৃNest.</p>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
      </div>
      <div class="field">
        <label for="user_type">I am a</label>
        <select id="user_type" name="user_type">
          <option value="patient">Patient / Parent</option>
          <option value="doctor">Doctor</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign up</button>
    </form>
    <p class="form-foot">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
  </div>
</section>
{% endblock %}
